<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rancho&family=Sacramento&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./asset/css/style.css">
</head>

<body>
    <section>
        <div class="background-img">
            <!-- <p>hello</p> -->
        </div>
        <div class="form">
            <div class="item-1">
                <img src="./asset/icon/Frame.svg" alt="logo-kopi" width="35px" height="35px">
                <h2>Coffee Shop</h2>
            </div>
            <div class="form-login">
                <h2>Login</h2>
                <h3>Fill out the form correctly</h3>
                <div class="container-email">
                    <label for="email">Email</label>
                    <img class="logo-email" src="./asset/icon/mail.svg" alt="logo-email">
                    <input type="email" placeholder="Enter Your Email">
                </div>
                <div class="container-password">
                    <label for="password">Password</label>
                    <img class="logo-password1" src="./asset/icon/Password.svg" alt="logo-password">
                    <img class="logo-password2" src="./asset/icon/EyeSlash.svg" alt="logo-eyeSlash">
                    <input type="password" placeholder="Enter Your Password">
                </div>
                <div class="item-lupaPassword">
                    <a href="#">Lupa Password?</a>
                </div>
                <div>
                    <button class="button-login" type="submit">Login</button>
                </div>
                <div class="opsi-register">
                    <p>Not Have An Account?<a href="#">Register</a></p>
                </div>
                <div class="item-or">
                    <div class="custom-line1"></div>
                    <p>Or</p>
                    <div class="custom-line2"></div>
                </div>
                <div class="item-account">
                    <img class="logo-facebook" src="./asset/icon/bx_bxl-facebook-circle.svg" alt="logo-facebook" height="25px" width="25px">
                    <button class="facebook">Facebook</button>
                    <img class="logo-google" src="./asset/icon/flat-color-icons_google.svg" alt="logo-google" height="25px" width="25px">
                    <button class="google">Google</button>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
