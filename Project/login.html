<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link rel="stylesheet" href="./asset/css/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rancho&family=Sacramento&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans&display=swap" rel="stylesheet">

</head>

<body>
    <section id="hero">
        <div class="background-login"></div>
        <div class="form">
            <form action="">
                <div class="box1">
                    <img src="./asset/icon/cangkir-kopi.svg" alt="">
                    <h2>Coffee Shop</h2>
                </div>
                <div class="box2">
                    <h2>Login</h2>
                    <p>Fill out the form correctly</p>
                </div>
                <div class="box3">
                    <label for="email">Email</label>
                    <img class="logo" src="./asset/icon/mail.svg" alt="logo-email">
                    <input for="email" id="email" type="email" placeholder="Enter Your Email">
                </div>
                <div class="box3">
                    <label for="password">Password</label>
                    <img class="logo" src="./asset/icon/Password.svg" alt="logo-password">
                    <!-- <img class="logo1" src="./asset/icon/EyeSlash.svg" alt="logo-eyeSlash"> -->
                    <input for="password" id="password" type="password" placeholder="Enter Your Password">
                </div>
                <div class="box4">
                    <a href="#">Lupa Password?</a>
                </div>
                <div class="box5">
                    <button type="submit">Login</button>
                </div>
                <div class="box6">
                    <p>Not Have An Account? <a href="#">Register</a></p>
                </div>
                <div class="box7">
                    <div class="line"></div>
                    <p>Or</p>
                    <div class="line"></div>
                </div>
                <div class="box8">
                    <div class="mini-box">
                        <button class="facebook"><img class="logo3" src="./asset/icon/facebook.svg" alt="logo-facebook">Facebook</button>
                    </div>
                    <div class="mini-box">
                        <button class="google"><img class="logo3" src="./asset/icon/google.svg" alt="logo-google">Google</button>
                    </div>
                </div>
            </form>
        </div>
    </section>
</body>

</html>
