<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>

    <link rel="stylesheet" href="./asset/css/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rancho&family=Sacramento&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans&display=swap" rel="stylesheet">

</head>

<body>
    <section id="hero">
        <div class="background-forgotpassword"></div>
        <div class="form">
            <form action="">
                <div class="box1">
                    <img src="./asset/icon/cangkir-kopi.svg" alt="">
                    <h2>Coffee Shop</h2>
                </div>
                <div class="box2">
                    <h2>Fill out the form correctly</h2>
                    <p>We will send new password to your email</p>
                </div>
                <div class="box3">
                    <label for="email">Email</label>
                    <img class="logo" src="./asset/icon/mail.svg" alt="logo-email">
                    <input for="email" id="email" type="email" placeholder="Enter Your Email">
                </div>
                <div class="box5">
                    <button type="submit">Submit</button>
                </div>
            </form>
        </div>
    </section>
</body>

</html>
